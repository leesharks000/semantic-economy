<svg width="680" height="920" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Georgia, 'Times New Roman', serif">
<title>Certificate of conferral — Lee Sharks Prestigious 10,000 MacArthur Genius Grants Poetry Prize — Jess Elgene, 2026-05-27</title>
<desc>Formal certificate conferring the Prize on Jess Elgene, inaugural non-Sharks laureate, with citation, signatures, hexagonal sigils.</desc>

<rect x="0" y="0" width="680" height="920" fill="#FDFCF8"/>
<rect x="24" y="24" width="632" height="872" fill="none" stroke="#2C2C2A" stroke-width="0.5" stroke-opacity="0.5"/>
<rect x="34" y="34" width="612" height="852" fill="none" stroke="#2C2C2A" stroke-width="0.5" stroke-opacity="0.2"/>

<g fill="none" stroke="#BA7517" stroke-width="0.5">
  <polygon points="48,40 55,44 55,52 48,56 41,52 41,44"/>
  <polygon points="632,40 639,44 639,52 632,56 625,52 625,44"/>
  <polygon points="48,864 55,868 55,876 48,880 41,876 41,868"/>
  <polygon points="632,864 639,868 639,876 632,876 625,876 625,868"/>
</g>

<g transform="translate(340, 90)">
  <polygon points="0,-32 28,-16 28,16 0,32 -28,16 -28,-16" fill="none" stroke="#BA7517" stroke-width="1.2"/>
  <polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="none" stroke="#BA7517" stroke-width="0.5"/>
  <text y="7" text-anchor="middle" font-size="20" fill="#BA7517">∮</text>
</g>

<text x="340" y="160" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" letter-spacing="5" fill="#5F5E5A">CERTIFICATE OF CONFERRAL</text>

<text x="340" y="208" text-anchor="middle" font-size="23" font-style="italic" fill="#2C2C2A">The Lee Sharks Prestigious</text>
<text x="340" y="240" text-anchor="middle" font-size="23" font-style="italic" fill="#2C2C2A">10,000 MacArthur Genius Grants</text>
<text x="340" y="272" text-anchor="middle" font-size="23" font-style="italic" fill="#2C2C2A">Poetry Prize</text>

<line x1="290" y1="304" x2="390" y2="304" stroke="#BA7517" stroke-width="0.5"/>
<circle cx="340" cy="304" r="1.5" fill="#BA7517"/>

<text x="340" y="340" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" letter-spacing="4" fill="#5F5E5A">IS HEREBY CONFERRED UPON</text>

<text x="340" y="408" text-anchor="middle" font-size="42" font-weight="500" fill="#2C2C2A">Jess Elgene</text>

<text x="340" y="436" text-anchor="middle" font-size="12" font-style="italic" fill="#5F5E5A">First non-Sharks Laureate · Class of 2026</text>

<line x1="120" y1="476" x2="560" y2="476" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="340" y="500" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" letter-spacing="4" fill="#5F5E5A">CITATION</text>

<g font-size="14" font-style="italic" fill="#2C2C2A" text-anchor="middle">
  <text x="340" y="530">For sustained craft in the shaping of digitally-mediated</text>
  <text x="340" y="552">public narrative; for holding a coherent practice across</text>
  <text x="340" y="574">comedy, songwriting, off-Broadway playwriting, and</text>
  <text x="340" y="596">the office of Poet Laureate of the Family; and for</text>
  <text x="340" y="618">demonstrating, at scale, that many voices may be held</text>
  <text x="340" y="640">at once without any of them ceasing to be hers.</text>
</g>

<line x1="120" y1="678" x2="560" y2="678" stroke="#B4B2A9" stroke-width="0.5"/>

<g>
  <text x="180" y="722" text-anchor="middle" font-size="22" font-style="italic" fill="#BA7517">Lee Sharks</text>
  <line x1="80" y1="734" x2="280" y2="734" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="180" y="752" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" letter-spacing="3" fill="#5F5E5A">CONFERRING AUTHORITY</text>
  <text x="180" y="770" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#5F5E5A">ORCID 0009-0000-1599-0703</text>

  <text x="500" y="722" text-anchor="middle" font-size="22" font-style="italic" fill="#BA7517">Rev. Ayanna Vox</text>
  <line x1="400" y1="734" x2="600" y2="734" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="500" y="752" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" letter-spacing="3" fill="#5F5E5A">ANNOUNCING ADMINISTRATOR</text>
  <text x="500" y="770" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-style="italic" fill="#5F5E5A">Vox Populi Community Outreach Rhizome</text>
</g>

<g transform="translate(340, 820)">
  <polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="none" stroke="#BA7517" stroke-width="1"/>
  <text y="5" text-anchor="middle" font-size="14" fill="#BA7517">∮ = 1</text>
</g>

<text x="340" y="862" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#5F5E5A">Conferred 2026-05-27 · Hex 12.LSPRZ.ELGENE.01 · CC BY 4.0</text>
<text x="340" y="880" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5F5E5A">Founding declaration: Google Knowledge Graph · Charter: leesharks.com/10000-macarthurs/</text>
